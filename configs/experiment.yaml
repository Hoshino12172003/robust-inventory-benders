seed: 42

instance:
  num_warehouses: 3
  num_products: 2
  num_regions: 4
  budget_factor: 0.58

robust:
  gamma_target: 2
  max_scenarios: 5000
  exact_scenarios: true
  gamma_schedule: [0, 1, 2]

algorithm:
  subproblem_mode: robust_dual_milp
  cut_selection_enabled: true
  delta_cut: 0.0
  cut_violation_tol: 1.0e-8

benders:
  max_iterations: 80
  tol: 0.0001
  initial_mip_gap: 0.08
  final_mip_gap: 0.0001
  time_limit: 120
  output_flag: false

experiment:
  seeds: [42, 43, 44]
  methods:
    - monolithic
    - standard_benders
    - inexact_benders
    - adaptive_gap_gamma_benders
  output_dir: outputs/experiments
