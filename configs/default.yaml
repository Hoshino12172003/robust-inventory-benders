seed: 42

instance:
  num_warehouses: 3
  num_products: 2
  num_regions: 4
  budget_factor: 0.58

robust:
  gamma_target: 2
  max_scenarios: 5000
  exact_scenarios: true
  gamma_schedule: [0, 1, 2]

algorithm:
  subproblem_mode: robust_dual_milp
  # With delta_cut = 0, cut selection keeps standard positive-violation behavior.
  cut_selection_enabled: true
  delta_cut: 0.0
  cut_violation_tol: 1.0e-8
  final_certification_enabled: false
  final_certification_no_cut_patience: 2
  precision_policy: legacy
  adaptive_master_precision_enabled: false
  adaptive_subproblem_precision_enabled: false
  master_gap_max: 0.08
  master_gap_min: 0.0001
  subproblem_gap_max: 0.0001
  subproblem_gap_min: 0.0001
  fixed_master_mip_gap: 0.08
  fixed_subproblem_mip_gap: 0.0001
  master_error_budget_ratio: 0.5
  subproblem_error_budget_ratio: 0.5
  monotone_precision_tightening: true

benders:
  max_iterations: 80
  tol: 0.0001
  initial_mip_gap: 0.08
  final_mip_gap: 0.0001
  time_limit: 120
  output_flag: false

experiment:
  seeds: [42, 43, 44]
  methods:
    - monolithic
    - standard_benders
    - inexact_benders
    - adaptive_gap_gamma_benders
  instance_path: data/processed/instance.json
  output_dir: outputs/experiments
