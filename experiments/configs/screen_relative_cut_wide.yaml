experiment_name: screen_relative_cut_wide
output_dir: experiments/results_diagnostics_round2/screen_relative_cut_wide
random_seeds: [0, 1, 2]
instance_sizes: [medium]
variants: [threshold_0, threshold_005, threshold_010, threshold_020, threshold_030, threshold_050]
variant_settings:
  threshold_0:
    adaptive_gap_enabled: true
    gamma_continuation_enabled: true
    cut_selection_enabled: true
    relative_cut_threshold: 0.0
  threshold_005:
    adaptive_gap_enabled: true
    gamma_continuation_enabled: true
    cut_selection_enabled: true
    relative_cut_threshold: 0.05
  threshold_010:
    adaptive_gap_enabled: true
    gamma_continuation_enabled: true
    cut_selection_enabled: true
    relative_cut_threshold: 0.10
  threshold_020:
    adaptive_gap_enabled: true
    gamma_continuation_enabled: true
    cut_selection_enabled: true
    relative_cut_threshold: 0.20
  threshold_030:
    adaptive_gap_enabled: true
    gamma_continuation_enabled: true
    cut_selection_enabled: true
    relative_cut_threshold: 0.30
  threshold_050:
    adaptive_gap_enabled: true
    gamma_continuation_enabled: true
    cut_selection_enabled: true
    relative_cut_threshold: 0.50
save_iteration_log: true
time_limit: 180
max_iterations: 300
tol: 0.0001
mip_gap: 0.05
final_mip_gap: 0.0001
gamma_target: 2
gamma_schedule: [0, 1, 2]
subproblem_mode: robust_dual_milp
cut_selection_mode: relative
cut_violation_tol: 1.0e-8
final_exact_gap: 0.01
cut_stall_patience: 5
adaptive_subproblem_gap_enabled: true
subproblem_gap_schedule:
  - global_gap_above: 0.10
    mip_gap: 0.05
  - global_gap_above: 0.05
    mip_gap: 0.02
  - global_gap_above: 0.01
    mip_gap: 0.005
  - global_gap_above: 0.00
    mip_gap: 0.0001
max_cuts_per_iteration: 2
subproblem_time_budget_per_iteration: 120
max_scenarios: 5000
exact_scenarios: true
