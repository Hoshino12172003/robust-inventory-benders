experiment_name: smoke_convergence_features
output_dir: experiments/results_diagnostics/smoke_convergence_features
random_seeds: [0]
instance_sizes: [very_small]
methods: [proposed_adaptive_benders]
save_iteration_log: true
time_limit: 60
max_iterations: 20
tol: 0.001
mip_gap: 0.05
final_mip_gap: 0.0001
gamma_target: 1
gamma_schedule: [0, 1]
subproblem_mode: robust_dual_milp
cut_selection_enabled: true
cut_selection_mode: relative
relative_cut_threshold: 0.0001
cut_violation_tol: 1.0e-8
final_exact_gap: 0.01
cut_stall_patience: 2
adaptive_subproblem_gap_enabled: true
subproblem_gap_schedule:
  - global_gap_above: 0.10
    mip_gap: 0.05
  - global_gap_above: 0.01
    mip_gap: 0.005
  - global_gap_above: 0.00
    mip_gap: 0.0001
max_cuts_per_iteration: 2
subproblem_time_budget_per_iteration: 30
max_scenarios: 5000
exact_scenarios: true
