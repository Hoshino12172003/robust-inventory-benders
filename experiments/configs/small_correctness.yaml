experiment_name: small_correctness
output_dir: experiments/results/small_correctness
random_seeds: [0, 1, 2]
instance_sizes: [small]
methods:
  - monolithic_gurobi
  - scenario_benders_full
  - standard_benders
  - proposed_adaptive_benders
time_limit: 120
mip_gap: 0.05
final_mip_gap: 0.0001
max_iterations: 80
gamma_target: 2
gamma_schedule: [0, 1, 2]
alpha_values: [0.9]
delta_cut_values: [0.0]
delta_cut: 0.0
max_scenarios: 5000
exact_scenarios: true
subproblem_mode: robust_dual_milp
budget_factor: 0.72
capacity_factor: 1.3
cost_scale: 1.0
demand_scale: 1.0
