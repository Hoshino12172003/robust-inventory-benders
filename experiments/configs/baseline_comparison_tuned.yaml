experiment_name: baseline_comparison
output_dir: experiments/results_tuned/baseline_comparison
random_seeds: [0, 1, 2, 3, 4]
instance_sizes: [small, medium]
methods:
  - standard_benders
  - static_inexact_benders
  - proposed_adaptive_benders
time_limit: 600
mip_gap: 0.05
final_mip_gap: 0.0001
max_iterations: 300
gamma_target: 2
gamma_schedule: [0, 1, 2]
alpha_values: [0.9]
delta_cut_values: [1000000.0]
delta_cut: 1000000.0
max_scenarios: 5000
exact_scenarios: true
subproblem_mode: robust_dual_milp
budget_factor: 0.7
capacity_factor: 1.25
cost_scale: 1.0
demand_scale: 1.0
